name: npm package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm'
        type: boolean
        default: false
      npm_tag:
        description: 'npm tag (candidate or latest)'
        default: 'candidate'

jobs:
  verify:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify bionic-compat.so
        run: |
          set -euo pipefail
          SO=packages/copilot-termux/lib/bionic-compat.so
          [ -f "$SO" ] || { echo "ERROR: bionic-compat.so missing"; exit 1; }
          readelf -h "$SO" | grep -q 'AArch64' || { echo "ERROR: not AArch64 ELF"; exit 1; }
          for sym in bcmp sdallocx __errno_location __xpg_strerror_r; do
            nm -D "$SO" | grep -qP "^[0-9a-f]+ T ${sym}$" || { echo "ERROR: Bionic symbol ${sym} not found"; exit 1; }
          done
          echo "bionic-compat.so: AArch64 + Bionic symbols OK"
          file "$SO"

      - name: Pack npm tarball
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/npm-pack"
          cd packages/copilot-termux
          TARBALL=$(npm pack --pack-destination "$RUNNER_TEMP/npm-pack" --silent)
          echo "TARBALL=$RUNNER_TEMP/npm-pack/$TARBALL" >> "$GITHUB_ENV"
          echo "Packed: $TARBALL"

      - name: Verify tarball contents
        run: |
          set -euo pipefail
          tar -tzf "$TARBALL" | grep -Fx 'package/lib/bionic-compat.so' || { echo "ERROR: bionic-compat.so not in tarball"; exit 1; }
          tar -tzf "$TARBALL" | grep -Fx 'package/scripts/bionic-compat.c' || { echo "ERROR: bionic-compat.c not in tarball"; exit 1; }
          tar -tzf "$TARBALL" | grep -Fx 'package/lib/setup.js' || { echo "ERROR: setup.js not in tarball"; exit 1; }
          echo "Tarball contents OK"

  publish:
    needs: verify
    if: ${{ fromJSON(inputs.publish) }}
    runs-on: ubuntu-24.04-arm
    environment: npm-publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate npm_tag
        run: |
          case "${{ inputs.npm_tag }}" in
            candidate|latest) ;;
            *) echo "ERROR: npm_tag must be 'candidate' or 'latest', got: ${{ inputs.npm_tag }}"; exit 1 ;;
          esac

      - name: Publish to npm
        run: |
          cd packages/copilot-termux
          npm publish --tag "${{ inputs.npm_tag }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update manifest
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./packages/copilot-termux/package.json').version")
          MANIFEST="config/copilot-termux-release-manifest.json"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('$MANIFEST', 'utf8'));
            m.last_updated = new Date().toISOString().slice(0,10);
            if ('${{ inputs.npm_tag }}' === 'candidate') {
              m.latest_candidate_version = '$VERSION';
              m.candidate_state = 'published';
            } else {
              m.latest_audited_version = '$VERSION';
              m.candidate_state = 'promoted';
            }
            fs.writeFileSync('$MANIFEST', JSON.stringify(m, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST"
          git diff --staged --quiet || git commit -m "chore: update manifest after publish"
          git push
