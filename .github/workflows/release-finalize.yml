name: Release finalize

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Released version'
        required: true
      release_notes:
        description: 'Release notes (optional)'
        default: ''

jobs:
  finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          NOTES="$NOTES_INPUT"
          [ -z "$NOTES" ] && NOTES="upstream @github/copilot@${VERSION} 追従。"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            --latest 2>/dev/null || echo "Release already exists, skipping"
