name: Copilot version watch

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: copilot-manifest-write
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check latest @github/copilot version
        id: check_version
        run: |
          LATEST=$(npm view @github/copilot version)
          CURRENT=$(node -e "const m=require('./packages/copilot-termux/config/copilot-termux-release-manifest.json'); console.log(m.copilot_version || 'none')")
          echo "Latest: $LATEST"
          echo "Current: $CURRENT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "NEW VERSION DETECTED: $LATEST"
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
          else
            echo "No new version"
          fi
      - name: Check for existing manifest PR
        if: steps.check_version.outputs.new_version != ''
        id: existing_pr_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="automation/copilot-watch-${{ steps.check_version.outputs.new_version }}"
          own_pr=$(gh pr list --repo bash0816/Github-Copilot-Termux --base main --head "$branch" --state open \
            --json number,headRepositoryOwner \
            --jq '[.[] | select(.headRepositoryOwner.login == "bash0816")] | .[0].number // empty')
          if [ -n "$own_pr" ]; then
            echo "existing_own_pr=$own_pr" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            other_count=$(gh pr list --repo bash0816/Github-Copilot-Termux --base main --state open \
              --json title,headRepositoryOwner \
              --jq '[.[] | select(.headRepositoryOwner.login == "bash0816" and (.title | startswith("[copilot-manifest]")))] | length')
            if [ "$other_count" -gt 0 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping new intake: another manifest-write PR is open (count=$other_count). Version ${{ steps.check_version.outputs.new_version }} detection deferred until existing PR resolved."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Checkout target branch
        if: steps.check_version.outputs.new_version != '' && steps.existing_pr_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.check_version.outputs.new_version }}"
          branch="automation/copilot-watch-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "${{ steps.existing_pr_check.outputs.existing_own_pr }}" ]; then
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
          else
            git checkout -B "$branch" origin/main
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Update manifest and package.json
        if: steps.check_version.outputs.new_version != '' && steps.existing_pr_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.check_version.outputs.new_version }}"

          # Update copilot-termux-release-manifest.json
          MANIFEST="packages/copilot-termux/config/copilot-termux-release-manifest.json"
          MANIFEST_ENV="$MANIFEST" NEW_VERSION_ENV="$NEW_VERSION" node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync(process.env.MANIFEST_ENV, 'utf8'));
            m.copilot_version = process.env.NEW_VERSION_ENV;
            m.last_updated = new Date().toISOString().slice(0,10);
            m.candidate_state = 'none';
            m.canonical_package_status = 'not_published';
            m.latest_candidate_version = null;
            fs.writeFileSync(process.env.MANIFEST_ENV, JSON.stringify(m, null, 2) + '\n');
          "

          # Update package.json version
          PKG="packages/copilot-termux/package.json"
          PKG_ENV="$PKG" NEW_VERSION_ENV="$NEW_VERSION" node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync(process.env.PKG_ENV, 'utf8'));
            p.version = process.env.NEW_VERSION_ENV;
            fs.writeFileSync(process.env.PKG_ENV, JSON.stringify(p, null, 2) + '\n');
          "

          # Update config/manifest.json (MANIFEST-002: setup.js が実際に読むファイル)
          SETUP_MANIFEST="packages/copilot-termux/config/manifest.json"
          INTEGRITY=$(npm view "@github/copilot-linuxmusl-arm64@${NEW_VERSION}" dist.integrity 2>/dev/null | head -1)
          if [ -z "$INTEGRITY" ]; then
            echo "ERROR: Could not fetch integrity for @github/copilot-linuxmusl-arm64@${NEW_VERSION}"
            exit 1
          fi
          SETUP_MANIFEST_ENV="$SETUP_MANIFEST" NEW_VERSION_ENV="$NEW_VERSION" INTEGRITY_ENV="$INTEGRITY" node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync(process.env.SETUP_MANIFEST_ENV, 'utf8'));
            m.copilot.version = process.env.NEW_VERSION_ENV;
            m.copilot.integrity = process.env.INTEGRITY_ENV;
            fs.writeFileSync(process.env.SETUP_MANIFEST_ENV, JSON.stringify(m, null, 2) + '\n');
          "
          echo "Updated config/manifest.json: version=$NEW_VERSION"

          echo "Updated manifest and package.json to version: $NEW_VERSION"
      - name: Analyze NAPI exports for new version
        id: napi_audit
        if: steps.check_version.outputs.new_version != '' && steps.existing_pr_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.check_version.outputs.new_version }}"
          PACK_DIR="/tmp/copilot-pack"
          mkdir -p "$PACK_DIR"

          if ! TARBALL_NAME=$(npm pack "@github/copilot-linuxmusl-arm64@${NEW_VERSION}" --pack-destination "$PACK_DIR" | tail -n 1); then
            echo "audit_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TARBALL="$PACK_DIR/$TARBALL_NAME"
          RUNTIME_RELATIVE=$(tar -tf "$TARBALL" | grep '/runtime.node$' | head -n 1 || true)
          if [ -z "$RUNTIME_RELATIVE" ]; then
            echo "audit_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUNTIME="$PACK_DIR/runtime.node"
          tar -xOf "$TARBALL" "$RUNTIME_RELATIVE" > "$RUNTIME"

          AUDIT_JSON=$(node scripts/napi-audit.js "$RUNTIME" "$NEW_VERSION" --auto-patch)

          DELIMITER="NAPI_AUDIT_$(head -c 8 /dev/urandom | xxd -p)"
          {
            echo "audit_result<<${DELIMITER}"
            printf '%s\n' "$AUDIT_JSON"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

          REVIEW_COUNT=$(node -e "const a=JSON.parse(process.argv[1]); process.stdout.write(String(a.newUnknown.length + a.newPendingGitAsync.length + a.newStreamRisk.length))" "$AUDIT_JSON")
          echo "review_count=$REVIEW_COUNT" >> "$GITHUB_OUTPUT"
          echo "tokio_patch_ok=$(node -e "const a=JSON.parse(process.argv[1]); process.stdout.write(String(a.tokioPatchOk))" "$AUDIT_JSON")" >> "$GITHUB_OUTPUT"
          echo "audit_skipped=false" >> "$GITHUB_OUTPUT"
      - name: Create issue for unknown NAPI exports
        if: steps.check_version.outputs.new_version != '' && steps.existing_pr_check.outputs.skip != 'true' && steps.napi_audit.outputs.audit_skipped != 'true' && steps.napi_audit.outputs.review_count != '0' && steps.napi_audit.outputs.review_count != ''
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.check_version.outputs.new_version }}
          AUDIT_RESULT: ${{ steps.napi_audit.outputs.audit_result }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          node -e '
            const audit = JSON.parse(process.env.AUDIT_RESULT);
            const version = process.env.NEW_VERSION;
            const serverUrl = process.env.GITHUB_SERVER_URL;
            const repository = process.env.GITHUB_REPOSITORY;
            const runId = process.env.GITHUB_RUN_ID;

            const SAFE_LIMIT = 50000;
            const lines = [];

            // Header section
            lines.push(`copilot@${version} の NAPI 監査結果`);
            lines.push("");
            lines.push(`newTokio: ${audit.newTokio.length}`);
            lines.push(`newPendingGitAsync: ${audit.newPendingGitAsync.length}`);
            lines.push(`newStreamRisk: ${audit.newStreamRisk.length}`);
            lines.push(`newUnknown: ${audit.newUnknown.length}`);
            lines.push("");

            const sections = [
              {
                name: "newTokio",
                title: "## newTokio",
                items: audit.newTokio
              },
              {
                name: "newPendingGitAsync",
                title: "## newPendingGitAsync（手動レビュー後にスタブ追加が必要）",
                items: audit.newPendingGitAsync
              },
              {
                name: "newStreamRisk",
                title: "## newStreamRisk（ストリーム経路、必ず手動確認）",
                items: audit.newStreamRisk
              },
              {
                name: "newUnknown",
                title: "## newUnknown",
                items: audit.newUnknown
              }
            ];

            let truncated = false;

            for (let sectionIdx = 0; sectionIdx < sections.length && !truncated; sectionIdx++) {
              const section = sections[sectionIdx];
              if (section.items.length === 0) continue;

              // Check if section title fits
              const testWithTitle = [...lines, section.title, ""].join("\n");
              if (testWithTitle.length >= SAFE_LIMIT) {
                // Remaining sections cannot fit, add consolidated notice
                const remainingCount = sections.slice(sectionIdx).reduce((sum, s) => sum + s.items.length, 0);
                lines.push("");
                lines.push(`... および他 ${remainingCount} 件は本文上限により表示を省略しました。`);
                lines.push(`[Workflow run のログで全件確認](${serverUrl}/${repository}/actions/runs/${runId})`);
                truncated = true;
                break;
              }

              lines.push(section.title);
              let sectionItemCount = 0;

              for (let itemIdx = 0; itemIdx < section.items.length; itemIdx++) {
                const item = section.items[itemIdx];
                const itemLine = `- ${item}`;
                const testWithItem = [...lines, itemLine].join("\n");

                // Reserve space for truncation notice (estimate)
                const truncNoticeEstimate = 250;
                if (testWithItem.length + truncNoticeEstimate >= SAFE_LIMIT) {
                  // Cannot fit this item and truncation notice, stop here
                  const remainingInSection = section.items.length - sectionItemCount;
                  const totalRemaining = remainingInSection + sections.slice(sectionIdx + 1).reduce((sum, s) => sum + s.items.length, 0);

                  lines.push("");
                  lines.push(`... および他 ${totalRemaining} 件は本文上限により表示を省略しました。`);
                  lines.push(`[Workflow run のログで全件確認](${serverUrl}/${repository}/actions/runs/${runId})`);
                  truncated = true;
                  break;
                }

                lines.push(itemLine);
                sectionItemCount++;
              }

              if (!truncated && sectionIdx < sections.length - 1) {
                lines.push("");
              }
            }

            process.stdout.write(lines.join("\n").trimEnd() + "\n");
          ' | gh issue create --title "⚠️ copilot@${NEW_VERSION}: 要レビューの新規 NAPI エクスポートを検出" --body-file -
      - name: Commit changes to branch
        if: steps.check_version.outputs.new_version != '' && steps.existing_pr_check.outputs.skip != 'true'
        id: commit_branch
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.check_version.outputs.new_version }}"
          branch="automation/copilot-watch-${NEW_VERSION}"

          git add packages/copilot-termux/config/copilot-termux-release-manifest.json packages/copilot-termux/config/manifest.json packages/copilot-termux/package.json packages/copilot-termux/lib/platform-patch.js config/napi-known-exports.json || true

          if [ -n "${{ steps.existing_pr_check.outputs.existing_own_pr }}" ]; then
            # 既存PRを再利用する場合、今回diffが無くても(既にpush済みの内容のまま)mergeリトライへ進む
            if git diff --staged --quiet; then
              echo "No new changes, but existing PR needs merge retry"
            else
              git commit -m "chore: detect copilot@${NEW_VERSION} and auto-update manifest/package.json"
              git push --force-with-lease origin "$branch"
            fi
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
          else
            if git diff --staged --quiet; then
              echo "No changes to commit"
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            else
              git commit -m "chore: detect copilot@${NEW_VERSION} and auto-update manifest/package.json"
              git push --force-with-lease origin "$branch"
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "branch=$branch" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create or reuse manifest PR
        if: steps.commit_branch.outputs.has_changes == 'true'
        id: pr_create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="${{ steps.commit_branch.outputs.branch }}"
          NEW_VERSION="${{ steps.check_version.outputs.new_version }}"
          if [ -n "${{ steps.existing_pr_check.outputs.existing_own_pr }}" ]; then
            pr_number="${{ steps.existing_pr_check.outputs.existing_own_pr }}"
            echo "Reusing existing PR #${pr_number}"
          else
            pr_url=$(gh pr create --base main --head "$branch" \
              --title "[copilot-manifest] Track copilot ${NEW_VERSION} candidate" \
              --body "Automated upstream copilot intake for version ${NEW_VERSION}.")
            pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
            echo "PR created: $pr_url"
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
      - name: Safe-merge or leave for review
        if: steps.commit_branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_PAT }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.pr_create.outputs.pr_number }}"
          audit_skipped="${{ steps.napi_audit.outputs.audit_skipped }}"
          review_count="${{ steps.napi_audit.outputs.review_count }}"
          tokio_patch_ok="${{ steps.napi_audit.outputs.tokio_patch_ok }}"

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ERROR: RELEASE_ADMIN_PAT secret is not set" >&2
            exit 1
          fi
          if ! gh api user >/dev/null 2>&1; then
            echo "ERROR: RELEASE_ADMIN_PAT is invalid or not authenticated" >&2
            exit 1
          fi

          if [ "$audit_skipped" != "true" ] && [ "$review_count" = "0" ] && [ "$tokio_patch_ok" = "true" ]; then
            branch="${{ steps.commit_branch.outputs.branch }}"
            git fetch origin main "$branch"
            pr_head_sha=$(gh pr view "$pr_number" --json headRefOid --jq '.headRefOid')
            if ! git merge-base --is-ancestor origin/main "$pr_head_sha"; then
              echo "ERROR: PR head does not include latest origin/main. Refusing to admin-merge to avoid rollback." >&2
              exit 1
            fi
            gh pr merge "$pr_number" --admin --squash --delete-branch
            echo "safe_merged=true" >> "$GITHUB_OUTPUT"
            echo "Manifest PR #${pr_number} merged (admin bypass, safe conditions met)"
          else
            echo "safe_merged=false" >> "$GITHUB_OUTPUT"
            gh pr comment "$pr_number" --body "自動マージをスキップしました(audit_skipped=$audit_skipped, review_count=$review_count, tokio_patch_ok=$tokio_patch_ok)。要人間レビュー: docs/operations/platform-patch-update-guide.md に従いbehavioral stub実装確認後にマージしてください。マージ後は手動でnpm-package.ymlをdispatchしてください。"
            echo "Manifest PR #${pr_number} left open for human review (safe-merge conditions not met)"
          fi
        id: safe_merge
      - name: Dispatch npm-package verify
        if: steps.check_version.outputs.new_version != '' && steps.existing_pr_check.outputs.skip != 'true' && steps.safe_merge.outputs.safe_merged == 'true'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.check_version.outputs.new_version }}"

          gh workflow run npm-package.yml \
            --repo bash0816/Github-Copilot-Termux \
            --field publish=false \
            --field retag_latest=false

          echo "Dispatched npm-package.yml verify (publish=false, retag_latest=false) for version ${NEW_VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Report workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh issue create \
            --title "⚠️ Copilot version watch failed" \
            --body "Workflow run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
